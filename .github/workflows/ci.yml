name: Machine Learning Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "Membangun Model/requirements.txt" ]; then pip install -r "Membangun Model/requirements.txt"; fi

    - name: Run Syntax Check
      run: |
        python -m py_compile "Membangun Model/modelling.py"
