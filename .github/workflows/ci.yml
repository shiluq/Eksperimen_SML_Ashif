name: Machine Learning Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# SOLUSI WARNING: Paksa server menggunakan Node.js 24 terbaru
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MLFLOW_ALLOW_FILE_STORE: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Menggunakan checkout versi v4 (mendukung Node 24)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Menggunakan setup-python versi v5 (mendukung Node 24)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install library dari folder Membangun Model
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "Membangun Model/requirements.txt" ]; then pip install -r "Membangun Model/requirements.txt"; fi

    # 4. Cek apakah ada file data yang kurang agar tidak error merah
    - name: Check Dataset File
      run: |
        ls -la "Membangun Model"

    # 5. Tes eksekusi pengecekan sintaks kode
    - name: Run Syntax Check
      run: |
        python -m py_compile "Membangun Model/modelling.py"
