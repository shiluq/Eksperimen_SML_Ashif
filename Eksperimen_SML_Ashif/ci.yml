name: Machine Learning Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari repository GitHub
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Setup Python di server GitHub Virtual Machine
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install semua library yang dibutuhkan dari requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "Membangun Model/requirements.txt" ]; then pip install -r "Membangun Model/requirements.txt"; fi

    # 4. Tes menjalankan script python untuk memastikan tidak ada syntax error
    - name: Run Syntax Check
      run: |
        python -m py_compile "Membangun Model/modelling.py"